<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlappyGradient | Web3 Play-to-Earn</title>
    <!-- Use a more reliable CDN for Ethers.js v5 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="application/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            touch-action: none; /* Prevent zoom on mobile */
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 50;
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            border: none;
            padding: 16px 32px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 24px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #334155;
            box-shadow: none;
        }

        .wallet-box {
            background: rgba(30, 41, 59, 0.8);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #38bdf8;
            margin: 20px 0;
            font-size: 14px;
            color: #7dd3fc;
            font-family: monospace;
            max-width: 90%;
            word-break: break-all;
        }

        .score-board {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 64px;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 20;
            pointer-events: none;
            opacity: 0.8;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.5));
        }

        /* Scanline effect */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 40;
        }
        
        .tutorial {
            position: absolute;
            bottom: 20%;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            animation: pulse 2s infinite;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <div class="score-board hidden" id="score">0</div>
    <div class="tutorial hidden" id="tutorial-msg">Tap / Click to Jump</div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
        <div class="max-w-md w-full px-6">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-2 gradient-text tracking-tighter">FlappyGradient</h1>
            <p class="text-blue-200 mb-8 font-medium">Web3 Play-to-Earn</p>

                <div class="wallet-box text-xs mx-auto" id="wallet-address">Generating...</div>
                
                <div class="flex items-center justify-between bg-slate-900/50 p-3 rounded-lg border border-slate-700 mb-4">
                    <span class="text-gray-400 text-xs">Balance:</span>
                    <div class="flex items-center gap-3">
                        <span id="balance" class="text-emerald-400 font-bold font-mono text-lg">0.0000</span>
                        <span class="text-emerald-600 text-xs font-bold">OPG</span>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button id="refresh-btn" onclick="manualCheck()" class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-sm font-semibold hover:bg-slate-600 transition">↻ Check Deposit</button>
                </div>
                
                <p id="status-msg" class="text-xs text-amber-400 h-5 mt-2 font-mono"></p>

                <button id="play-btn" class="btn w-full" disabled>Waiting for 0.0001 OPG...</button>
            </div>
            
            <!-- OpenGradient Footer -->
            <div class="mt-8 text-center animate-pulse">
                <p class="text-xs text-slate-400 mb-2 uppercase tracking-widest font-bold">Built on</p>
                <div class="flex flex-col items-center gap-3">
                    <img src="opengradient-logo.jpg" alt="OpenGradient" class="h-12 rounded-lg border border-slate-600 shadow-lg shadow-blue-500/20">
                    
                    <div class="flex gap-4 mt-2">
                        <a href="https://twitter.com/OpenGradient" target="_blank" class="text-slate-400 hover:text-sky-400 transition transform hover:scale-110">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                        </a>
                        <a href="https://discord.gg/opengradient" target="_blank" class="text-slate-400 hover:text-indigo-400 transition transform hover:scale-110">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.772-.6083 1.1588a18.2532 18.2532 0 00-5.4964 0 12.64 12.64 0 01-.6173-1.1636.077.077 0 00-.0793-.0376 19.7363 19.7363 0 00-4.8852 1.5151.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.419-2.1568 2.419zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.419-2.1568 2.419z"/></svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <div class="text-center">
            <h2 class="text-5xl font-black text-white mb-2 drop-shadow-lg">GAME OVER</h2>
            <div class="bg-slate-800/80 p-8 rounded-2xl border border-slate-600 m-6 backdrop-blur-md">
                <p class="text-slate-400 text-sm uppercase tracking-widest mb-1">Score</p>
                <p class="text-6xl font-black text-sky-400 mb-6" id="final-score">0</p>
            </div>
            <button onclick="goToStartScreen()" class="btn px-12">Return to Menu</button>
        </div>
    </div>

    <script>
        // --- Web3 Configuration ---
        const provider = new ethers.providers.JsonRpcProvider("https://sepolia.base.org");
        const OPG_ADDRESS = "0x240b09731d96979f50b2c649c9ce10fcf9c7987f";
        const OPG_ABI = ["function balanceOf(address owner) view returns (uint256)"];
        const MIN_DEPOSIT = 0.0001;
        
        let gameWallet = null;
        let isDeposited = false;

        // --- Game Variables ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let frames = 0;
        let score = 0;
        let gameState = 'START'; // START, GET_READY, PLAYING, GAMEOVER
        let gameSpeed = 3;
        
        // Physics
        const gravity = 0.08; // Super slow gravity (Floaty feel)
        const jumpStrength = 3.0; // Adjusted jump

        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Bird Object
        const bird = {
            x: 50,
            y: canvas.height / 2,
            radius: 18,
            velocity: 0,
            rotation: 0,
            
            draw: function() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Smooth rotation
                let targetRotation = (this.velocity * 0.1);
                this.rotation += (targetRotation - this.rotation) * 0.1;
                ctx.rotate(this.rotation);
                
                // Body (Gradient)
                let grad = ctx.createRadialGradient(-5, -5, 2, 0, 0, this.radius);
                grad.addColorStop(0, '#7dd3fc');
                grad.addColorStop(1, '#0284c7');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();
                
                // Glow
                ctx.shadowColor = '#0ea5e9';
                ctx.shadowBlur = 15;
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#e0f2fe';
                ctx.stroke();
                ctx.shadowBlur = 0; // Reset

                // Eye
                ctx.beginPath();
                ctx.fillStyle = 'white';
                ctx.arc(8, -6, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.fillStyle = '#0f172a';
                ctx.arc(10, -6, 2, 0, Math.PI*2);
                ctx.fill();
                
                // Wing
                ctx.beginPath();
                ctx.ellipse(-6, 4, 10, 6, -0.2, 0, Math.PI*2);
                ctx.fillStyle = '#0369a1';
                ctx.fill();

                ctx.restore();
            },
            
            update: function() {
                // Gravity only applies in PLAYING state
                if (gameState === 'PLAYING') {
                    this.velocity += gravity;
                    this.y += this.velocity;
                } else if (gameState === 'GET_READY') {
                    // Hover effect
                    this.y = (canvas.height / 2) + Math.sin(frames * 0.05) * 10;
                    this.velocity = 0;
                    this.rotation = 0;
                }

                // Floor collision
                if (this.y + this.radius >= canvas.height) {
                    this.y = canvas.height - this.radius;
                    gameOver();
                }
                
                // Ceiling collision
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            },
            
            flap: function() {
                this.velocity = -jumpStrength;
            }
        };

        // Pipes Object
        const pipes = {
            items: [],
            width: 70,
            gap: 180, // More generous gap
            dx: 2, // Reduced from 3 to 2 for slower scrolling
            
            draw: function() {
                ctx.fillStyle = '#1e293b'; // Dark slate
                ctx.strokeStyle = '#0ea5e9'; // Blue Neon (Sky 500)
                ctx.lineWidth = 3;
                ctx.shadowColor = '#0ea5e9';
                
                for(let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    
                    // Neon Glow only on edges
                    ctx.shadowBlur = 10; 
                    
                    // Top Pipe
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    ctx.strokeRect(p.x, 0, this.width, p.top);
                    
                    // Bottom Pipe
                    ctx.fillRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                    ctx.strokeRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                    
                    ctx.shadowBlur = 0;
                    
                    // Detail lines
                    ctx.fillStyle = 'rgba(14, 165, 233, 0.2)'; // Blue tint
                    ctx.fillRect(p.x + 10, 0, 5, p.top);
                    ctx.fillRect(p.x + 10, canvas.height - p.bottom, 5, p.bottom);
                }
            },
            
            update: function() {
                // Add new pipe
                if (frames % 180 === 0) { // Spacing
                    let maxY = canvas.height - this.gap - 100;
                    let topHeight = Math.random() * (maxY - 50) + 50;
                    
                    this.items.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: canvas.height - (topHeight + this.gap),
                        passed: false
                    });
                }
                
                for(let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= this.dx;
                    
                    // Collision
                    if (
                        bird.x + bird.radius > p.x && 
                        bird.x - bird.radius < p.x + this.width && 
                        (bird.y - bird.radius < p.top || bird.y + bird.radius > canvas.height - p.bottom)
                    ) {
                        gameOver();
                    }
                    
                    // Score
                    if (p.x + this.width < bird.x && !p.passed) {
                        score++;
                        p.passed = true;
                        document.getElementById('score').innerText = score;
                        // Speed up slightly every 5 points
                        if(score % 5 === 0) this.dx += 0.2;
                    }
                    
                    // Remove
                    if (p.x + this.width < 0) {
                        this.items.shift();
                    }
                }
            },
            
            reset: function() {
                this.items = [];
                this.dx = 2;
            }
        };

        // --- COOL 3D BACKGROUND (Synthwave / Cyberpunk Style) ---
        const bgEffect = {
            time: 0,
            
            draw: function() {
                this.time += 0.05;
                
                // 1. Dark Background with subtle gradient
                let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                bgGrad.addColorStop(0, '#020617'); // Very dark blue
                bgGrad.addColorStop(1, '#0f172a'); // Slate 900
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 2. RetroWave Sun / Glow at Horizon
                const horizonY = canvas.height * 0.6;
                const centerX = canvas.width / 2;
                
                let sunGrad = ctx.createRadialGradient(centerX, horizonY, 10, centerX, horizonY, 400);
                sunGrad.addColorStop(0, 'rgba(14, 165, 233, 0.3)'); // Sky blue glow
                sunGrad.addColorStop(1, 'rgba(14, 165, 233, 0)');
                ctx.fillStyle = sunGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 3. 3D Perspective Grid (The "Cool" Part)
                ctx.save();
                ctx.beginPath();
                // Clip bottom area for grid
                ctx.rect(0, horizonY, canvas.width, canvas.height - horizonY);
                ctx.clip();

                ctx.strokeStyle = '#38bdf8'; // Sky 400
                ctx.lineWidth = 2;
                ctx.shadowColor = '#0ea5e9'; // Sky 500
                ctx.shadowBlur = 15; // Neon Glow

                // Vertical Lines (Perspective)
                const fov = 300;
                for(let x = -canvas.width; x < canvas.width * 2; x += 100) {
                    // Simple perspective: lines converge to vanishing point (centerX, horizonY)
                    ctx.beginPath();
                    ctx.moveTo(centerX, horizonY); 
                    // Calculate bottom position based on angle
                    // Just drawing rays from center for simplicity and speed
                    let angle = Math.atan2(canvas.height - horizonY, x - centerX);
                    // This is a cheat for perspective lines, but looks good
                    ctx.moveTo(x, canvas.height);
                    ctx.lineTo(centerX + (x - centerX) * 0.1, horizonY);
                    ctx.stroke();
                }

                // Horizontal Lines (Moving forward)
                // Z movement simulation
                const speed = 2;
                const offset = (Date.now() * 0.1) % 100;
                
                for(let z = 0; z < canvas.height; z += 40) {
                    // Exponential spacing for 3D feel
                    // y = horizonY + (distance)
                    // We map linear steps to exponential Y positions
                    let p = (z + offset) / 1000; // 0 to 1
                    if (p > 1) p -= 1;
                    
                    // Non-linear projection for 3D floor effect
                    let y = horizonY + (Math.pow(p, 3) * (canvas.height - horizonY));
                    
                    if (y > canvas.height) continue;

                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    // Fade out near horizon
                    ctx.globalAlpha = p; 
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;
                ctx.restore();

                // 4. Floating Particles (Digital Dust) above horizon
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#fff';
                
                // Deterministic random using sine waves for performance
                for(let i=0; i<30; i++) {
                    let px = (Math.sin(i * 132.1 + this.time * 0.02) * 0.5 + 0.5) * canvas.width;
                    let py = (Math.cos(i * 45.3 + this.time * 0.03) * 0.5 + 0.5) * horizonY;
                    let size = Math.sin(i) * 1.5 + 1.5;
                    
                    ctx.globalAlpha = Math.sin(this.time + i) * 0.5 + 0.5;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
            }
        };

        // Game Loop
        function loop() {
            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Background based on state
            if (gameState === 'START' || gameState === 'GET_READY') {
                 bgEffect.draw();
            } else {
                 // Simple dark background for gameplay to avoid distraction
                 let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                 bgGrad.addColorStop(0, '#0f172a'); 
                 bgGrad.addColorStop(1, '#1e293b');
                 ctx.fillStyle = bgGrad;
                 ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            if (gameState === 'GET_READY') {
                bird.update();
                bird.draw();
            } else if (gameState === 'PLAYING') {
                pipes.update();
                pipes.draw();
                bird.update();
                bird.draw();
                frames++;
            }
            
            if (gameState !== 'GAMEOVER') {
                requestAnimationFrame(loop);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('tutorial-msg').classList.remove('hidden');
            
            gameState = 'GET_READY';
            bird.x = canvas.width / 3; // Position bird slightly left
            bird.y = canvas.height / 2;
            
            loop();
        }

        function handleInput() {
            if (gameState === 'GET_READY') {
                gameState = 'PLAYING';
                document.getElementById('score').classList.remove('hidden');
                document.getElementById('tutorial-msg').classList.add('hidden');
                bird.flap();
            } else if (gameState === 'PLAYING') {
                bird.flap();
            }
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('score').classList.add('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function goToStartScreen() {
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            
            // Reset game state but don't start
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes.reset();
            score = 0;
            frames = 0;
            document.getElementById('score').innerText = 0;
            
            gameState = 'START';
            attractLoop(); // Restart background particles
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes.reset();
            score = 0;
            frames = 0;
            document.getElementById('score').innerText = 0;
            document.getElementById('game-over-screen').classList.add('hidden');
            startGame(); // Go back to Get Ready
        }

        // Inputs
        window.addEventListener('keydown', e => {
            if(e.code === 'Space' || e.code === 'ArrowUp') handleInput();
        });
        window.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Stop scrolling
            handleInput();
        }, {passive: false});
        window.addEventListener('mousedown', handleInput);


        // --- Wallet Logic (Kept from previous version) ---
        async function initWallet() {
            try {
                const storedKey = localStorage.getItem('fg_private_key');
                if (storedKey) {
                    gameWallet = new ethers.Wallet(storedKey, provider);
                } else {
                    gameWallet = ethers.Wallet.createRandom().connect(provider);
                    localStorage.setItem('fg_private_key', gameWallet.privateKey);
                }

                const address = gameWallet.address;
                document.getElementById('wallet-address').innerText = address;
                document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${address}`;
                
                checkBalance();
            } catch (err) {
                console.error("Wallet Error:", err);
                document.getElementById('status-msg').innerText = "Wallet Init Error";
            }
        }

        async function manualCheck() {
            const btn = document.getElementById('refresh-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true;
            btn.innerText = "Checking...";
            status.innerText = "Querying Base Sepolia...";
            
            await checkBalance(true);
            
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "↻ Check Deposit";
                if (!isDeposited) status.innerText = "No tokens found yet.";
            }, 1000);
        }

        function enableDemoMode() {
            isDeposited = true;
            const playBtn = document.getElementById('play-btn');
            playBtn.disabled = false;
            playBtn.innerText = "START GAME (DEMO) 🎮";
            playBtn.onclick = startGame;
            playBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            playBtn.classList.add('animate-pulse');
            
            document.getElementById('balance').innerText = "100.0";
            document.getElementById('status-msg').innerText = "Demo Mode Active";
            document.getElementById('status-msg').className = "text-xs text-emerald-400 h-5 mt-2 font-mono font-bold";
        }

        async function checkBalance(isManual = false) {
            if (isDeposited) return;
            try {
                const opgContract = new ethers.Contract(OPG_ADDRESS, OPG_ABI, provider);
                const balanceWei = await opgContract.balanceOf(gameWallet.address);
                const balanceOpg = ethers.utils.formatEther(balanceWei);
                
                document.getElementById('balance').innerText = parseFloat(balanceOpg).toFixed(4);

                if (parseFloat(balanceOpg) >= MIN_DEPOSIT) {
                    isDeposited = true;
                    const playBtn = document.getElementById('play-btn');
                    playBtn.disabled = false;
                    playBtn.innerText = "START GAME 🎮";
                    playBtn.onclick = startGame;
                    playBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    playBtn.classList.add('animate-pulse');
                    
                    const status = document.getElementById('status-msg');
                    status.innerText = "Deposit Confirmed!";
                    status.className = "text-xs text-emerald-400 h-5 mt-2 font-mono font-bold";
                }
            } catch (err) {
                console.error("Balance Check Error:", err);
            }
        }

        // Initial Loop for particles bg before game starts
        function attractLoop() {
            if (gameState === 'START') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                bgEffect.draw();
                requestAnimationFrame(attractLoop);
            }
        }
        
        initWallet().catch(err => console.error("Init Error:", err));
        
        // Start animation immediately
        try {
            attractLoop();
        } catch(e) {
            console.error("Anim Error:", e);
        }
        
    </script>
</body>
</html>
